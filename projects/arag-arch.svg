<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 700" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="ahg" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0e7490"/></marker>
  </defs>
  <rect width="1140" height="700" fill="#ffffff"/>

  <text x="30" y="34" font-size="23" font-weight="700" fill="#1e293b">Agentic RAG Pháp luật VN — Kiến trúc (retrieval layer)</text>
  <rect x="760" y="14" width="350" height="36" rx="9" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="935" y="37" font-size="13" text-anchor="middle" fill="#64748b">Agent (Deep Agents) + Gradio — ROADMAP</text>

  <!-- INGESTION -->
  <rect x="20" y="70" width="1100" height="195" rx="14" fill="#d3f9d8" fill-opacity="0.45" stroke="#22c55e" stroke-width="1"/>
  <text x="38" y="93" font-size="14" font-weight="700" fill="#15803d">INGESTION</text>

  <g font-size="14" fill="#1e293b" text-anchor="middle">
    <rect x="36"  y="125" width="156" height="62" rx="10" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
    <text x="114" y="150">HF dataset</text><text x="114" y="170" font-size="12" fill="#475569">content/meta/rel</text>
    <rect x="232" y="125" width="156" height="62" rx="10" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
    <text x="310" y="150">Loader</text><text x="310" y="170" font-size="12" fill="#475569">sample theo quan hệ</text>
    <rect x="428" y="125" width="156" height="62" rx="10" fill="#ffd8a8" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="506" y="150">Cleaner</text><text x="506" y="170" font-size="12" fill="#92400e">HTML→markdown</text>
    <rect x="624" y="125" width="156" height="62" rx="10" fill="#ffd8a8" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="702" y="150">Chunker</text><text x="702" y="170" font-size="12" fill="#92400e">Điều/Khoản/Điểm</text>
    <rect x="880" y="92"  width="230" height="44" rx="9" fill="#c3fae8" stroke="#0e7490" stroke-width="1.5"/>
    <text x="995" y="120" font-weight="700">ChromaDB · vector</text>
    <rect x="880" y="146" width="230" height="44" rx="9" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="995" y="174" font-weight="700">BM25 · lexical (VN)</text>
    <rect x="880" y="200" width="230" height="44" rx="9" fill="#eebefa" stroke="#c026d3" stroke-width="1.5"/>
    <text x="995" y="223" font-weight="700">Graph · NetworkX</text>
    <text x="995" y="237" font-size="11" fill="#86198f">(từ bảng quan hệ)</text>
  </g>
  <g stroke="#475569" stroke-width="2" marker-end="url(#ah)">
    <line x1="192" y1="156" x2="230" y2="156"/>
    <line x1="388" y1="156" x2="426" y2="156"/>
    <line x1="584" y1="156" x2="622" y2="156"/>
    <line x1="780" y1="150" x2="878" y2="116"/>
    <line x1="780" y1="160" x2="878" y2="166"/>
    <line x1="310" y1="187" x2="890" y2="216"/>
  </g>

  <!-- RETRIEVAL -->
  <rect x="20" y="295" width="1100" height="385" rx="14" fill="#dbe4ff" fill-opacity="0.5" stroke="#4a9eed" stroke-width="1"/>
  <text x="38" y="318" font-size="14" font-weight="700" fill="#2563eb">RETRIEVAL  ·  5 chiến lược</text>

  <rect x="36" y="450" width="150" height="62" rx="10" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="111" y="486" font-size="15" text-anchor="middle" fill="#1e293b">Câu hỏi</text>

  <rect x="250" y="345" width="430" height="300" rx="12" fill="#ffffff" stroke="#4a9eed" stroke-width="1"/>
  <text x="270" y="368" font-size="13" font-weight="700" fill="#2563eb">Chiến lược truy xuất</text>
  <g font-size="14" text-anchor="middle" fill="#1e293b">
    <rect x="275" y="382" width="380" height="42" rx="8" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.2"/><text x="465" y="408">Dense (Chroma + BGE-M3)</text>
    <rect x="275" y="432" width="380" height="42" rx="8" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.2"/><text x="465" y="458">BM25 (lexical, tách từ tiếng Việt)</text>
    <rect x="275" y="482" width="380" height="42" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.2"/><text x="465" y="508">Hybrid + RRF</text>
    <rect x="275" y="532" width="380" height="42" rx="8" fill="#c3fae8" stroke="#0e7490" stroke-width="1.5"/><text x="465" y="558" font-weight="700">Graph traversal (multi-hop)</text>
    <rect x="275" y="582" width="380" height="42" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5 3"/><text x="465" y="608" fill="#64748b">Reranker (optional)</text>
  </g>

  <rect x="760" y="470" width="220" height="74" rx="10" fill="#b2f2bb" stroke="#22c55e" stroke-width="1.5"/>
  <text x="870" y="502" font-size="15" text-anchor="middle" fill="#1e293b">Kết quả xếp hạng</text>
  <text x="870" y="524" font-size="12" text-anchor="middle" fill="#166534">+ doc_id · quan hệ · score</text>

  <line x1="186" y1="481" x2="248" y2="495" stroke="#475569" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="680" y1="503" x2="758" y2="505" stroke="#475569" stroke-width="2" marker-end="url(#ah)"/>

  <!-- indices feed strategies -->
  <line x1="900" y1="246" x2="600" y2="343" stroke="#0e7490" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#ahg)"/>
  <rect x="690" y="288" width="150" height="26" rx="6" fill="#ffffff" stroke="#0e7490" stroke-width="1"/>
  <text x="765" y="306" font-size="13" text-anchor="middle" fill="#0e7490">đọc 3 chỉ mục</text>
</svg>
