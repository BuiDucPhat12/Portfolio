<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 660" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="ahc" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0e7490"/>
    </marker>
    <marker id="ahp" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c026d3"/>
    </marker>
  </defs>
  <rect width="1120" height="660" fill="#ffffff"/>

  <text x="30" y="36" font-size="24" font-weight="700" fill="#1e293b">NotebookLM mini — Kiến trúc RAG</text>
  <rect x="690" y="12" width="400" height="40" rx="10" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="890" y="37" font-size="15" text-anchor="middle" fill="#92400e">Giao diện: CLI (Typer) · Streamlit UI</text>

  <!-- INGESTION zone -->
  <rect x="20" y="70" width="1080" height="170" rx="14" fill="#d3f9d8" fill-opacity="0.45" stroke="#22c55e" stroke-width="1"/>
  <text x="38" y="94" font-size="14" font-weight="700" fill="#15803d">INGESTION  ·  PDF → vector</text>

  <g font-size="15" fill="#1e293b" text-anchor="middle">
    <rect x="36"  y="120" width="150" height="64" rx="10" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
    <text x="111" y="158">PDF học tập</text>
    <rect x="232" y="120" width="150" height="64" rx="10" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
    <text x="307" y="148">PyPDFLoader</text><text x="307" y="168" font-size="13" fill="#475569">(theo trang)</text>
    <rect x="428" y="120" width="150" height="64" rx="10" fill="#ffd8a8" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="503" y="148">Recursive</text><text x="503" y="168">Chunker</text>
    <rect x="624" y="120" width="150" height="64" rx="10" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="699" y="148">GreenNode</text><text x="699" y="168">Embedding VN</text>
    <rect x="860" y="112" width="200" height="92" rx="10" fill="#c3fae8" stroke="#0e7490" stroke-width="1.5"/>
    <text x="960" y="150" font-weight="700">Qdrant</text><text x="960" y="172" font-size="13" fill="#475569">vector store · idempotent</text>
  </g>
  <g stroke="#475569" stroke-width="2" marker-end="url(#ah)">
    <line x1="186" y1="152" x2="230" y2="152"/>
    <line x1="382" y1="152" x2="426" y2="152"/>
    <line x1="578" y1="152" x2="622" y2="152"/>
    <line x1="774" y1="152" x2="858" y2="156"/>
  </g>

  <!-- QUERY zone -->
  <rect x="20" y="300" width="1080" height="330" rx="14" fill="#dbe4ff" fill-opacity="0.5" stroke="#4a9eed" stroke-width="1"/>
  <text x="38" y="324" font-size="14" font-weight="700" fill="#2563eb">QUERY  ·  RAG</text>

  <g font-size="15" fill="#1e293b" text-anchor="middle">
    <rect x="36"  y="360" width="150" height="64" rx="10" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
    <text x="111" y="398">Câu hỏi</text>
    <rect x="232" y="360" width="150" height="64" rx="10" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="307" y="398">Embedding</text>
    <rect x="428" y="360" width="150" height="64" rx="10" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5"/>
    <text x="503" y="388">Retrieve</text><text x="503" y="408" font-size="13" fill="#475569">(top_k + filter)</text>
    <rect x="624" y="360" width="150" height="64" rx="10" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="699" y="398">Prompt (Jinja2)</text>
    <rect x="820" y="360" width="180" height="64" rx="10" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="910" y="398" font-weight="700">Gemini LLM</text>
    <rect x="820" y="500" width="200" height="74" rx="10" fill="#b2f2bb" stroke="#22c55e" stroke-width="1.5"/>
    <text x="920" y="532">Câu trả lời</text><text x="920" y="554" font-size="13" fill="#166534">+ citations [S1][S2]</text>
    <rect x="356" y="510" width="290" height="64" rx="10" fill="#eebefa" stroke="#c026d3" stroke-width="1.5"/>
    <text x="501" y="538">Học tập:</text><text x="501" y="558" font-size="13" fill="#86198f">Tóm tắt · Quiz · Flashcards</text>
  </g>
  <g stroke="#475569" stroke-width="2" marker-end="url(#ah)">
    <line x1="186" y1="392" x2="230" y2="392"/>
    <line x1="382" y1="392" x2="426" y2="392"/>
    <line x1="578" y1="392" x2="622" y2="392"/>
    <line x1="774" y1="392" x2="818" y2="392"/>
    <line x1="910" y1="424" x2="910" y2="498"/>
  </g>

  <!-- Qdrant → Retrieve (context) -->
  <line x1="958" y1="204" x2="510" y2="358" stroke="#0e7490" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#ahc)"/>
  <rect x="690" y="262" width="96" height="26" rx="6" fill="#ffffff" stroke="#0e7490" stroke-width="1"/>
  <text x="738" y="280" font-size="13" text-anchor="middle" fill="#0e7490">ngữ cảnh</text>

  <!-- Retrieve → Học tập -->
  <line x1="503" y1="424" x2="502" y2="508" stroke="#c026d3" stroke-width="2" marker-end="url(#ahp)"/>
</svg>
